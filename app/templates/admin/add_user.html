<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Admin — Visionexa Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="admin-body">
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="admin-brand">
            <a href="/" class="admin-brand-link">Visionexa</a>
            <span class="admin-badge">Admin</span>
        </div>
        <nav class="admin-nav">
            <a href="{{ url_for('admin.dashboard') }}" class="admin-nav-link">Dashboard</a>
            <a href="{{ url_for('admin.admin_users') }}" class="admin-nav-link">Admins</a>
            <a href="{{ url_for('admin.logout') }}" class="admin-nav-link admin-logout">Logout</a>
        </nav>
    </aside>
    <main class="admin-main">
        <div class="admin-page-header">
            <div>
                <h1 class="admin-page-title">Add admin</h1>
                <p class="admin-page-sub">Grant another email access to the admin panel.</p>
            </div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash-message flash-{{ category }}" style="margin-bottom: 1rem;">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="admin-form-card">
            <form method="POST" class="admin-form">
                <div class="form-group">
                    <label for="email">Admin email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="newadmin@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="button button-primary">Add admin</button>
                    <a href="{{ url_for('admin.admin_users') }}" class="button button-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
