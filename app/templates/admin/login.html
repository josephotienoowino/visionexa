<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Visionexa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
<div class="admin-login-page">
    <div class="admin-login-card">
        <div class="admin-login-brand">
            <span class="nav-brand" style="-webkit-text-fill-color: unset; color: #fff;">Visionexa</span>
            <span class="admin-badge">Admin</span>
        </div>
        <h1 class="admin-login-title">Welcome back</h1>
        <p class="admin-login-sub">Sign in to manage content and site settings.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash-message flash-{{ category }}" style="margin-bottom: 1.25rem;">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" class="admin-login-form">
            <div class="form-group">
                <label class="form-group label" for="email">Admin email</label>
                <input type="email" id="email" name="email"
                       class="form-control" placeholder="joseyusuf0@gmail.com" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-group label" for="password">Admin password</label>
                <input type="password" id="password" name="password"
                       class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="button button-primary" style="width: 100%; margin-top: 0.5rem;">
                Sign in
            </button>
        </form>

        <p class="admin-login-back">
            <a href="{{ url_for('main.index') }}">&larr; Back to the site</a>
        </p>
    </div>
</div>
</body>
</html>
